<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Z1">
<title>Z1 · ZONE'23</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{--ink:#16150f;--paper:#e7e3d0;--paper2:#dcd7c0;--paper3:#cdc7ac;--dim:#7d7a66;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:#0b0a06;}
  body{font-family:'VT323',monospace;color:var(--ink);background:repeating-linear-gradient(0deg,rgba(0,0,0,.04) 0 1px,transparent 1px 3px),var(--paper);-webkit-font-smoothing:none;image-rendering:pixelated;max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative;overflow-x:hidden;}
  .pix{font-family:'Press Start 2P',monospace;}
  .disabled{opacity:.38;pointer-events:none;}
  input:disabled,select:disabled{opacity:.38;}
  header{border-bottom:3px solid var(--ink);background:var(--ink);position:sticky;top:0;z-index:20;}
  header .hrow{padding:9px 12px;display:flex;align-items:center;justify-content:space-between;}
  header .hcenter{text-align:center;border-top:3px solid var(--paper);padding:7px 0 8px;}
  header .hcenter .rr{font-family:'Press Start 2P';font-size:11px;letter-spacing:1px;color:var(--paper);}
  header .hcenter .rrline{width:140px;height:0;border-top:2px solid var(--paper);margin:7px auto;}
  header .hcenter .clock{font-family:'Press Start 2P';font-size:11px;color:var(--paper);}
  header .lhs{display:flex;align-items:center;gap:11px;}
  header .logo{font-family:'Press Start 2P';font-size:15px;color:var(--paper);}
  header .logo-img{width:38px;height:38px;display:block;image-rendering:auto;}
  header .dd{border-left:3px solid var(--paper);padding-left:11px;line-height:1.25;}
  header .dd .d{font-family:'Press Start 2P';font-size:10px;color:var(--paper);}
  header .dd .dt{font-size:15px;color:#b3ae97;}
  .wallet{border:3px solid var(--paper);padding:7px 9px;background:transparent;cursor:pointer;display:flex;align-items:center;gap:7px;color:var(--paper);}
  .wallet .cashic{width:24px;height:16px;}
  .wallet .amt{font-family:'Press Start 2P';font-size:11px;line-height:1.4;color:var(--paper);}
  .wallet .amt small{display:block;font-family:'VT323';font-size:12px;color:#b3ae97;}
  main{flex:1;overflow-y:auto;padding-bottom:82px;}
  .screen{display:none;padding:14px;}
  .screen.active{display:block;animation:fade .2s steps(3);}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  h2.sec{font-family:'Press Start 2P';font-size:12px;margin:2px 0 12px;border-bottom:3px dashed var(--ink);padding-bottom:10px;}
  .sub{font-size:18px;color:var(--dim);margin:-2px 0 14px;line-height:1.25;}

  .vowcard{border:4px solid var(--ink);margin-bottom:13px;background:var(--paper2);}
  .vowcard .vh{font-family:'Press Start 2P';font-size:10px;background:var(--ink);color:var(--paper);padding:11px 12px;line-height:1.5;}
  .vowcard .vb{padding:11px 12px;}
  .vowrow{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px dotted var(--dim);}
  .vowrow:last-child{border-bottom:none;}
  .vowtoggle{font-family:'Press Start 2P';font-size:7px;border:3px solid var(--ink);padding:7px 8px;min-width:76px;text-align:center;cursor:pointer;background:var(--paper);}
  .vowtoggle.broken{color:var(--paper);background-image:repeating-linear-gradient(45deg,var(--ink) 0 5px,#3a3829 5px 10px);}
  .vowrow input{border:none;border-bottom:2px solid var(--dim);background:transparent;font-size:17px;padding:3px 0;flex:1;}
  .vowbanner{font-family:'Press Start 2P';font-size:8px;line-height:1.7;border:3px solid var(--ink);background:var(--ink);color:var(--paper);padding:10px;margin-top:10px;}

  .card{border:3px solid var(--ink);margin-bottom:11px;background:var(--paper);}
  .card-h{display:flex;align-items:center;justify-content:space-between;padding:11px 12px;cursor:pointer;user-select:none;background:var(--paper2);border-bottom:3px solid var(--ink);}
  .card-h.closed{border-bottom:none;}
  .card-h .ti{display:flex;align-items:center;gap:10px;font-family:'Press Start 2P';font-size:10px;}
  .glyph{width:30px;height:30px;border:3px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:17px;background:var(--paper);}
  .card-h .ti .necedit{font-size:13px;border:2px solid var(--ink);padding:2px 6px;cursor:pointer;line-height:1;}
  .rhs{display:flex;align-items:center;gap:8px;}
  .dot{width:13px;height:13px;border:2px solid var(--ink);background:var(--paper);}
  .dot.on{background:var(--ink);}
  .scorepill{font-family:'Press Start 2P';font-size:9px;border:2px solid var(--ink);padding:6px;min-width:48px;text-align:center;}
  .scorepill.ok{background:var(--ink);color:var(--paper);}
  .card-b{padding:12px;display:none;}
  .card-b.open{display:block;}
  label.lbl{display:block;font-size:17px;margin:11px 0 4px;}
  input[type=text],input[type=number],input[type=time],select{width:100%;font-family:'VT323';font-size:19px;padding:9px;border:3px solid var(--ink);background:var(--paper);color:var(--ink);border-radius:0;appearance:none;}
  input:focus,select:focus{outline:none;background:#fffdf1;}
  .row{display:flex;gap:8px;}.row>*{flex:1;}
  .hint{font-size:16px;color:var(--dim);margin:6px 0 0;line-height:1.3;}
  .todo{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px dotted var(--dim);}
  .todo:last-child{border-bottom:none;}
  .box{width:24px;height:24px;border:3px solid var(--ink);flex:none;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--paper);font-size:15px;}
  .box.on{background:var(--ink);color:var(--paper);}
  .todo input.tt{border:none;border-bottom:2px solid var(--dim);background:transparent;font-size:18px;padding:3px 0;flex:1;}
  .todo .spiritlabel{font-size:18px;flex:1;padding:3px 0;}
  .todo .del{cursor:pointer;color:var(--dim);font-size:20px;padding:0 4px;}
  .addbtn{font-family:'VT323';font-size:17px;border:3px dashed var(--ink);background:transparent;width:100%;padding:9px;margin-top:9px;cursor:pointer;}
  .ackbtn{font-family:'Press Start 2P';font-size:8px;border:3px solid var(--ink);background:var(--paper);padding:10px;margin-top:10px;cursor:pointer;width:100%;}
  .ackbtn.on{background:var(--ink);color:var(--paper);}
  .persona{border:2px solid var(--ink);padding:10px;margin-bottom:10px;}
  .persona h4{margin:0 0 5px;font-family:'Press Start 2P';font-size:9px;}
  .persona .need{font-size:14px;color:var(--dim);font-family:'VT323';}
  .meal{margin-bottom:11px;border:2px solid transparent;padding:3px;}
  .meal.skipped{border:3px solid var(--ink);background:repeating-linear-gradient(45deg,var(--paper) 0 6px,var(--paper3) 6px 12px);}
  .meal .top{display:flex;align-items:center;gap:8px;}
  .meal .mn{width:92px;font-size:17px;}
  .seg{display:flex;flex:1;border:3px solid var(--ink);}
  .seg button{flex:1;font-family:'VT323';font-size:15px;background:var(--paper);border:none;border-right:3px solid var(--ink);padding:8px 2px;cursor:pointer;color:var(--ink);}
  .seg button:last-child{border-right:none;}
  .seg button.sel{background:var(--ink);color:var(--paper);}
  .mealnote{margin-top:6px;}.mealnote input{font-size:16px;padding:6px 8px;border-width:2px;}
  .skipwarn{font-family:'Press Start 2P';font-size:8px;line-height:1.6;margin-top:6px;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:5px;}
  .chip{font-family:'VT323';font-size:16px;border:3px solid var(--ink);background:var(--paper);padding:7px 11px;cursor:pointer;}
  .chip.on{background:var(--ink);color:var(--paper);}
  .timepick{display:flex;gap:6px;align-items:center;}
  .timepick select{flex:1;text-align:center;}
  .timepick span{font-family:'Press Start 2P';font-size:11px;}
  .nowbtn{font-family:'Press Start 2P';font-size:8px;border:3px solid var(--ink);background:var(--ink);color:var(--paper);padding:0 12px;cursor:pointer;flex:none;}
  .exp{display:flex;gap:8px;align-items:center;font-size:17px;padding:6px 0;border-bottom:1px dotted var(--dim);}
  .exp .amt{font-family:'Press Start 2P';font-size:10px;min-width:62px;}
  .exp .cat{flex:1;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .exp .del{color:var(--dim);cursor:pointer;padding:0 4px;font-size:18px;}
  .budgetline,.calcline{font-family:'Press Start 2P';font-size:11px;border:3px solid var(--ink);padding:11px;margin-top:11px;text-align:center;line-height:1.7;}
  .submit{font-family:'Press Start 2P';font-size:12px;width:100%;padding:17px;border:3px solid var(--ink);background:var(--ink);color:var(--paper);cursor:pointer;margin-top:8px;letter-spacing:1px;}
  .submit:active{transform:translate(2px,2px);}
  .submit.dim{background:var(--paper);color:var(--dim);}
  .nextday{font-family:'Press Start 2P';font-size:11px;width:100%;padding:15px;border:3px solid var(--ink);background:var(--paper2);cursor:pointer;margin-top:9px;}
  .submitted-note{border:3px solid var(--ink);padding:12px;font-size:17px;line-height:1.4;margin-top:8px;}
  .submitted-note b{font-family:'Press Start 2P';font-size:9px;}
  .daystamp{text-align:center;font-family:'Press Start 2P';font-size:12px;margin-bottom:14px;line-height:1.6;}
  .daystamp small{display:block;font-family:'VT323';font-size:17px;color:var(--dim);margin-top:7px;}
  .backtoday{display:block;width:100%;text-align:center;font-family:'Press Start 2P';font-size:9px;border:3px solid var(--ink);background:var(--paper2);padding:11px;margin-bottom:14px;cursor:pointer;}
  .recap-row{display:flex;align-items:center;justify-content:space-between;border:2px solid var(--ink);padding:9px 11px;margin-bottom:7px;font-size:17px;}
  .recap-row .rp{font-family:'Press Start 2P';font-size:9px;}
  .recap-row .rp.ok{background:var(--ink);color:var(--paper);padding:5px 7px;}
  .recap-verdict{font-family:'Press Start 2P';font-size:13px;text-align:center;border:3px solid var(--ink);padding:14px;margin:14px 0;}
  .resetlink{display:block;text-align:center;font-size:15px;color:var(--dim);margin:22px 0 8px;text-decoration:underline;cursor:pointer;}

  .cc{border:3px solid var(--ink);background:var(--paper2);padding:13px;margin-bottom:14px;}
  .cc .top{display:flex;justify-content:space-between;align-items:flex-start;}
  .cc .big{font-family:'Press Start 2P';font-size:14px;}
  .cc .date{font-size:16px;color:var(--dim);margin-top:5px;}
  .cc .streak{font-family:'Press Start 2P';font-size:9px;border:2px solid var(--ink);padding:6px 8px;background:var(--paper);}
  .cc .vowmini{display:flex;gap:6px;align-items:center;margin-top:11px;font-size:15px;cursor:pointer;}
  .cc .vowmini .vd{width:14px;height:14px;border:2px solid var(--ink);background:var(--paper);}
  .cc .vowmini .vd.x{background-image:repeating-linear-gradient(45deg,var(--ink) 0 3px,transparent 3px 6px);}
  .cc .stripe{display:flex;gap:8px;margin-top:11px;}
  .cc .tile{flex:1;border:2px solid var(--ink);background:var(--paper);padding:8px;text-align:center;}
  .cc .tile .k{font-size:13px;color:var(--dim);text-transform:uppercase;}
  .cc .tile .v{font-family:'Press Start 2P';font-size:10px;margin-top:5px;}
  .cc .cta{font-family:'Press Start 2P';font-size:12px;width:100%;border:3px solid var(--ink);background:var(--ink);color:var(--paper);padding:14px;margin-top:12px;cursor:pointer;}
  .cc .cta.pulse{animation:bob .9s steps(2) infinite alternate;}
  .ccbtns{display:flex;gap:6px;margin-top:9px;}
  .ccbtns button{flex:1;font-family:'Press Start 2P';font-size:7px;line-height:1.4;border:3px dashed var(--ink);background:transparent;padding:10px 3px;cursor:pointer;}
  .legend{display:flex;flex-wrap:wrap;justify-content:center;gap:4px 9px;font-size:12px;color:var(--dim);margin-bottom:6px;padding:0 2px;line-height:1.3;}
  .legend span{white-space:nowrap;}
  .legend b{font-family:'Press Start 2P';font-size:7px;color:var(--ink);}
  #board{position:relative;width:360px;margin:0 auto;}
  .band{position:absolute;left:0;width:360px;z-index:0;}
  .node{position:absolute;width:46px;height:46px;display:flex;align-items:center;justify-content:center;border:3px solid var(--ink);background:var(--paper);font-family:'Press Start 2P';font-size:11px;cursor:pointer;z-index:2;}
  .node.win{background:var(--ink);color:var(--paper);}
  .node.lost .num{opacity:.18;}
  .node.lost .xmark{position:absolute;font-size:30px;}
  .node.future{border-style:dashed;color:var(--dim);}
  .node.ult{width:54px;height:54px;border-style:double;border-width:6px;font-size:12px;}
  .node.current{box-shadow:0 0 0 3px var(--paper),0 0 0 6px var(--ink);}
  .node.bob{animation:bob .8s steps(2) infinite alternate;}
  @keyframes bob{from{transform:translateY(0)}to{transform:translateY(-4px)}}
  .node .rwbadge{position:absolute;top:-14px;right:-15px;font-size:16px;z-index:3;}
  .node .star{position:absolute;top:-13px;left:-13px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;background:var(--paper);color:var(--ink);border:3px solid var(--ink);font-size:12px;line-height:1;z-index:5;}
  .ndate{position:absolute;font-size:13px;color:var(--dim);font-family:'VT323';width:80px;text-align:center;z-index:1;}
  .youpin{position:absolute;font-family:'Press Start 2P';font-size:8px;background:var(--ink);color:var(--paper);padding:5px 7px;z-index:6;white-space:nowrap;transform:translate(-50%,0);}
  .youpin::after{content:"";position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--ink);}
  .hero{position:absolute;width:64px;height:64px;transform:translate(-50%,0);z-index:7;cursor:pointer;display:flex;align-items:flex-end;justify-content:center;}
  .hero-img{width:64px;height:64px;object-fit:contain;image-rendering:pixelated;}
  .hero-fallback{font-size:40px;line-height:1;}
  .hero.hop{animation:herohop .42s steps(4);}
  @keyframes herohop{0%{transform:translate(-50%,0)}40%{transform:translate(-50%,-12px)}70%{transform:translate(-50%,-3px)}100%{transform:translate(-50%,0)}}
  .hero-bubble{position:absolute;bottom:68px;left:50%;transform:translateX(-50%);background:var(--paper);color:var(--ink);border:3px solid var(--ink);font-family:'VT323';font-size:16px;line-height:1.15;padding:7px 9px;white-space:nowrap;z-index:9;box-shadow:3px 3px 0 rgba(22,21,15,.3);animation:bubblein .18s steps(3);}
  .hero-bubble.out{opacity:0;transition:opacity .2s;}
  @keyframes bubblein{from{opacity:0;transform:translateX(-50%) translateY(4px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  .chapter{position:absolute;width:360px;text-align:center;font-family:'Press Start 2P';font-size:10px;color:var(--ink);z-index:1;}
  .chapter small{display:block;font-family:'VT323';font-size:15px;color:var(--dim);margin-top:5px;letter-spacing:1px;}
  .chapter .rule{display:inline-block;width:46px;border-top:2px solid var(--ink);vertical-align:middle;margin:0 9px;}
  .boardflag{text-align:center;font-family:'Press Start 2P';font-size:10px;padding:10px 0;line-height:1.6;}
  .fab{position:fixed;bottom:92px;right:max(14px,calc(50% - 226px));width:54px;height:54px;border:3px solid var(--ink);background:var(--ink);color:var(--paper);font-family:'Press Start 2P';font-size:15px;z-index:40;cursor:pointer;box-shadow:4px 4px 0 rgba(22,21,15,.35);display:flex;align-items:center;justify-content:center;}
  .fab:active{transform:translate(2px,2px);box-shadow:2px 2px 0 rgba(22,21,15,.35);}

  .pickbadge{display:flex;align-items:center;gap:11px;border:3px solid var(--ink);background:var(--ink);color:var(--paper);padding:12px;margin-bottom:11px;}
  .pickbadge .n{font-family:'Press Start 2P';font-size:20px;}
  .pickbadge .t{font-size:16px;line-height:1.3;}
  .tokbar{border:3px dashed var(--ink);padding:11px;margin-bottom:14px;font-size:15px;line-height:1.5;color:var(--ink);}
  .tokbar b{font-family:'Press Start 2P';font-size:8px;}
  .shoptab{display:flex;margin-bottom:14px;border:3px solid var(--ink);}
  .shoptab button{flex:1;font-family:'Press Start 2P';font-size:9px;padding:12px 4px;background:var(--paper);border:none;border-right:3px solid var(--ink);cursor:pointer;color:var(--ink);}
  .shoptab button:last-child{border-right:none;}
  .shoptab button.sel{background:var(--ink);color:var(--paper);}
  .reward{border:3px solid var(--ink);margin-bottom:11px;padding:11px;display:flex;gap:11px;align-items:center;}
  .reward.claimed{background:var(--paper2);}
  .reward.ult{border-style:double;border-width:6px;}
  .reward.missed{opacity:.5;}
  .reward .ic{width:44px;height:44px;border:3px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:24px;flex:none;cursor:pointer;position:relative;}
  .reward .ic .pen{position:absolute;bottom:-7px;right:-7px;font-size:11px;background:var(--paper);border:2px solid var(--ink);width:18px;height:18px;display:flex;align-items:center;justify-content:center;}
  .reward .info{flex:1;}
  .reward .rn{font-family:'Press Start 2P';font-size:9px;line-height:1.6;}
  .reward .meta{font-size:16px;color:var(--dim);margin-top:5px;}
  .reward .claim{font-family:'Press Start 2P';font-size:8px;border:3px solid var(--ink);background:var(--ink);color:var(--paper);padding:9px;cursor:pointer;white-space:nowrap;line-height:1.5;}
  .reward .claim:disabled{background:var(--paper);color:var(--dim);border-color:var(--dim);cursor:not-allowed;}
  .reward.claimed .claim{background:var(--paper);color:var(--ink);border-style:double;}

  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px;}
  .tile2{border:3px solid var(--ink);padding:13px;text-align:center;}
  .tile2 .v{font-family:'Press Start 2P';font-size:18px;}
  .tile2 .k{font-size:15px;color:var(--dim);margin-top:7px;text-transform:uppercase;}
  .insbox{border:3px solid var(--ink);padding:12px;margin-bottom:16px;}
  .insbox h3{font-family:'Press Start 2P';font-size:10px;margin:0 0 12px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .insbox h3 .edit{font-size:8px;border:2px solid var(--ink);padding:5px 7px;cursor:pointer;flex:none;}
  .balrow{display:flex;align-items:center;gap:9px;margin-bottom:9px;font-size:16px;}
  .balrow .nm{width:104px;}
  .balrow .track{flex:1;height:16px;border:2px solid var(--ink);background:var(--paper);}
  .balrow .track i{display:block;height:100%;background:var(--ink);}
  .balrow .pc{font-family:'Press Start 2P';font-size:9px;width:40px;text-align:right;}
  .balrow .tag{font-family:'Press Start 2P';font-size:7px;border:2px solid var(--ink);padding:3px 4px;}
  .balrow .tag.bad{background:var(--ink);color:var(--paper);}
  .wk{display:flex;justify-content:space-between;border-bottom:1px dotted var(--dim);padding:8px 0;font-size:16px;}
  .wk .wv{font-family:'Press Start 2P';font-size:9px;}
  .callout{border:3px solid var(--ink);background:var(--paper2);padding:12px;font-size:17px;line-height:1.4;margin-bottom:16px;}
  .callout b{font-family:'Press Start 2P';font-size:9px;}
  .bcat{padding:7px 0;display:flex;justify-content:space-between;font-size:16px;}

  nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:480px;width:100%;display:flex;border-top:3px solid var(--ink);background:var(--ink);z-index:30;}
  nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;font-family:'Press Start 2P';font-size:8px;padding:11px 2px 10px;background:var(--ink);border:none;border-right:3px solid var(--paper);color:#b3ae97;cursor:pointer;position:relative;}
  nav button:last-child{border-right:none;}
  nav button svg{width:21px;height:21px;fill:currentColor;}
  nav button.sel{color:var(--ink);background:var(--paper);}

  #overlay{position:fixed;inset:0;background:var(--paper);z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:22px;}
  #overlay.show{display:flex;}
  #overlay .verdict{font-family:'Press Start 2P';font-size:18px;margin-bottom:10px;}
  #overlay .vsub{font-size:19px;color:var(--dim);margin-bottom:18px;line-height:1.35;max-width:340px;}
  .tvwrap{display:flex;flex-direction:column;align-items:center;margin-bottom:18px;}
  .antenna{width:90px;height:34px;position:relative;margin-bottom:-3px;}
  .antenna span{position:absolute;left:50%;bottom:0;width:4px;height:40px;background:var(--ink);transform-origin:bottom center;}
  .antenna .a1{transform:rotate(-32deg);}.antenna .a2{transform:rotate(32deg);}

  html+='<svg style="position:absolute;left:0;top:0;z-index:0" width="360" height="'+LY.H+'" viewBox="0 0 360 '+LY.H+'"><polyline points="'+pts+'" fill="none" stroke="#16150f" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" opacity="0.8"/></svg>';
  CHAPTERS.forEach(ch=>{const q=pos(ch.start);const topY=(ch.start===1)?6:(q.y-66);html+='<div class="chapter" style="top:'+topY+'px"><span class="rule"></span>CHP '+ch.n+'<span class="rule"></span><small>'+ch.name+' · DAYS '+ch.start+'–'+ch.end+'</small></div>';});
  for(let d=1;d<=TOTAL;d++){const q=pos(d),rec=S.days[d],isU=ULT_DAYS.includes(d),isS=SMALL_DAYS.includes(d);
    let cls='node';if(rec)cls+=rec.won?' win':' lost';else if(d>S.activeDay)cls+=' future';if(isU)cls+=' ult';if(d===S.activeDay){cls+=' current';if(!rec)cls+=' bob';}
    const sz=isU?27:NODER;let inner='<span class="num">'+d+'</span>';
    if(rec&&!rec.won)inner+='<span class="xmark">✕</span>';
    if(rec&&rec.flawless)inner+='<span class="star">★</span>';
    if(isU)inner+='<span class="rwbadge">🏆</span>';else if(isS)inner+='<span class="rwbadge">🎁</span>';
    html+='<div class="'+cls+'" data-day="'+d+'" style="left:'+(q.x-sz)+'px;top:'+(q.y-sz)+'px">'+inner+'</div>';
    html+='<div class="ndate" style="left:'+(q.x-40)+'px;top:'+(q.y+sz+3)+'px">'+fmt(d)+'</div>';
    if(d===S.activeDay){
      const heroSrc=S.gifs.player||DEFAULT_HERO;
      const fighter='<img src="'+heroSrc+'" class="hero-img" id="heroImg">';
      html+='<div class="hero" id="heroChar" style="left:'+q.x+'px;top:'+(q.y-sz-76)+'px">'+fighter+'</div>';
      html+='<div class="youpin" style="left:'+q.x+'px;top:'+(q.y-sz-26)+'px">YOU</div>';
    }
  }
  board.innerHTML=html;
  board.querySelectorAll('[data-day]').forEach(n=>n.onclick=()=>openDay(+n.dataset.day));
  const hero=document.getElementById('heroChar');if(hero)wireHero(hero);
  setTimeout(()=>{const a=board.querySelector('.node.current');if(a)a.scrollIntoView({block:'center'});},40);
}

const HERO_LINES=['Radhe-Radhe.','Chama! 🔥','They don\u2019t know, do they?','Show up. That\u2019s the game.','One more day. Let\u2019s go.','Discipline > motivation.','Stay on your toes.','Win the morning.','Surrender, never give up.','You vs. you. Always.','Trust the climb.','Eat. Train. Pray. Repeat.','Small reps, big life.','Day one energy. Daily.','Hold the line.'];
let heroQuoteT,heroTapT,heroPunchT;
function heroBubble(){
  const hero=document.getElementById('heroChar');if(!hero)return;
  document.querySelectorAll('.hero-bubble').forEach(b=>b.remove());
  const line=HERO_LINES[Math.floor(Math.random()*HERO_LINES.length)];
  const b=document.createElement('div');b.className='hero-bubble';b.textContent=line;
  hero.appendChild(b);
  clearTimeout(heroQuoteT);heroQuoteT=setTimeout(()=>{b.classList.add('out');setTimeout(()=>b.remove(),200);},1500);
}
function heroHop(){const hero=document.getElementById('heroChar');if(!hero)return;hero.classList.remove('hop');void hero.offsetWidth;hero.classList.add('hop');}
function heroPunch(){
  const img=document.getElementById('heroImg');if(!img)return;
  const idle=S.gifs.player||DEFAULT_HERO,punch=S.gifs.playerPunch||DEFAULT_PUNCH;
  img.src=punch;clearTimeout(heroPunchT);
  heroPunchT=setTimeout(()=>{img.src=idle;},1100);
}
function wireHero(hero){
  hero.onclick=()=>{
    if(heroTapT){clearTimeout(heroTapT);heroTapT=null;heroBubble();heroPunch();return;}
    heroTapT=setTimeout(()=>{heroTapT=null;heroBubble();heroHop();},230);
  };
}

/* ---------- SHOP ---------- */
let shopTab='small';
function rewardOf(tab,i){const def=(tab==='small'?SMALL_DEF:ULT_DEF)[i],c=S.customRewards[tab+i];return{ic:c&&c.ic?c.ic:def.ic,n:c&&c.n?c.n:def.n};}
document.querySelectorAll('[data-shop]').forEach(b=>b.onclick=()=>{shopTab=b.dataset.shop;document.querySelectorAll('[data-shop]').forEach(x=>x.classList.toggle('sel',x===b));renderShop();});
function renderShop(){
  document.getElementById('pbN').textContent=S.smallTok;
  document.getElementById('tokbar').innerHTML='<b>HOW IT WORKS</b><br>SMALL: win a 🎁 reward day, lock the next day → bank a pick → spend it on any small reward.<br>ULTIMATE: fixed to days 21 / 42 / 63 / 84 — win that day and it unlocks, in order.';

function renderStats(){
  const body=document.getElementById('statsBody');
  const recs=Object.entries(S.days).map(([d,r])=>({day:+d,...r})).sort((a,b)=>a.day-b.day);

    let ls=0,cur=0,prev=null;recs.forEach(r=>{if(r.won&&(prev===null||r.day===prev+1))cur++;else cur=r.won?1:0;if(cur>ls)ls=cur;prev=r.day;});
    const avg={};NEC.forEach(n=>avg[n.key]=recs.reduce((s,r)=>s+r.scores[n.key],0)/recs.length);

    h+='<div class="callout"><b>🎯 FOCUS HERE</b><br>Most-ignored stat: <b>'+weakName+'</b> ('+Math.round(avg[weakKey]*100)+'% avg'+(tr?', '+tr:'')+'). Clear 70% here for more flawless days.</div>';
    h+='<div class="insbox"><h3>DAILY SCORE TREND</h3>'+lineChart(recs.map(r=>({day:r.day,pct:Math.round(r.overall*100)})))+'</div>';
    h+='<div class="insbox"><h3>STAT BALANCE (avg)</h3>';ranked.forEach(([k,v],i)=>{const n=NEC.find(x=>x.key===k),p=Math.round(v*100),tag=i===0?'<span class="tag">TOP</span>':(i===ranked.length-1?'<span class="tag bad">IGNORED</span>':'');h+='<div class="balrow"><span class="nm">'+n.g+' '+esc(nName(k))+'</span><span class="track"><i style="width:'+p+'%"></i></span><span class="pc">'+p+'%</span>'+tag+'</div>';});h+='</div>';

function monthlyBox(recs){
  const months=challengeMonths(),mi=months.indexOf(viewMonth),mk=viewMonth,cats={};let total=0;
  recs.forEach(r=>{if(monthKey(r.day)!==mk)return;(r.expenses||[]).forEach(e=>{cats[e.cat]=(cats[e.cat]||0)+(parseFloat(e.amt)||0);total+=(parseFloat(e.amt)||0);});});
  if(monthKey(S.activeDay)===mk&&!S.days[S.activeDay]){(S.draft.expenses||[]).forEach(e=>{cats[e.cat]=(cats[e.cat]||0)+(parseFloat(e.amt)||0);total+=(parseFloat(e.amt)||0);});}
  const bud=budgetFor(mk);
  const prevDis=mi<=0?' disabled':'',nextDis=mi>=months.length-1?' disabled':'';
  let h='<div class="insbox"><h3>MONTHLY MONEY<span class="edit" id="editBudget">edit budget</span></h3>';
  h+='<div class="monthnav"><button class="mnav" id="mPrev"'+prevDis+'>‹</button><span class="mlabel pix">'+monthKeyName(mk)+'</span><button class="mnav" id="mNext"'+nextDis+'>›</button></div>';
  h+='<div class="bcat" style="font-family:Press Start 2P;font-size:9px;border-bottom:2px solid var(--ink)"><span>TOTAL SPENT</span><span>₹'+total+'</span></div>';
  const dq=(S.dailyByMonth&&S.dailyByMonth[mk])||{},dDaily=dq.daily||dailyBaseFor(mk),dMon=dq.monthly||Math.round(dDaily*(dq.days||30));
  h+='<div class="bcat" style="padding:8px 0;border-bottom:1px dotted var(--dim)"><span>spend allowance <span class="necedit" data-dailymonth="'+mk+'">✎</span></span><span>₹'+dDaily+'/day · ₹'+dMon+'/mo</span></div>';
  const allCats=[...new Set([...Object.keys(bud),...Object.keys(cats)])];
  if(!allCats.length)h+='<p style="font-size:15px;color:var(--dim);margin-top:8px">Nothing logged for this month yet. Set caps with “edit budget”, or just log spends and watch them tally up here.</p>';
  allCats.forEach(c=>{const sp=cats[c]||0,al=bud[c]||0,pct=al?Math.min(sp/al*100,100):0,over=al&&sp>al;h+='<div style="margin:9px 0"><div class="bcat" style="padding:3px 0"><span>'+esc(c)+'</span><span>₹'+sp+(al?' / ₹'+al:'')+(over?' ⚠':'')+'</span></div>'+(al?'<div class="track" style="height:13px;border:2px solid var(--ink)"><i style="display:block;height:100%;background:var(--ink);width:'+pct+'%"></i></div>':'')+'</div>';});
  h+='</div>';return h;
}
function editBudget(){
  const mk=viewMonth,startBud=nearestBudget(mk);
  const rowHtml=(name,amt)=>'<div class="budrow"><input type="text" class="bcatname" value="'+esc(name)+'" placeholder="category"><input type="number" inputmode="numeric" class="bcatamt" value="'+(amt||'')+'" placeholder="₹/mo"><span class="budrm">✕</span></div>';
  const rows=S.cats.map(c=>rowHtml(c,startBud[c])).join('');
  showModal('<div class="modal-head"><h3 style="margin:0">BUDGET · '+monthKeyName(mk)+'</h3><span class="modal-x" id="mClose">✕</span></div><p style="font-size:15px">Set this month\u2019s caps. Rename, add or remove categories (these are the same ones you tag expenses with, so the breakdown always matches). Blank = no cap.</p><div id="budRows">'+rows+'</div><button class="addbtn" id="budAdd">+ add category</button><div class="modal-btns"><button class="ghost" id="mCancel">CANCEL</button><button class="solid" id="mSave">SAVE</button></div><div class="resetlink" id="clearMonth" style="margin:14px 0 0">clear this month\u2019s caps</div>');
  const wireRm=()=>{document.querySelectorAll('#budRows .budrm').forEach(x=>x.onclick=()=>x.closest('.budrow').remove());};
  wireRm();
  document.getElementById('budAdd').onclick=()=>{const w=document.createElement('div');w.className='budrow';w.innerHTML='<input type="text" class="bcatname" value="" placeholder="category"><input type="number" inputmode="numeric" class="bcatamt" value="" placeholder="₹/mo"><span class="budrm">✕</span>';document.getElementById('budRows').appendChild(w);wireRm();w.querySelector('.bcatname').focus();};
  document.getElementById('mClose').onclick=hideModal;
  document.getElementById('mCancel').onclick=hideModal;
  document.getElementById('clearMonth').onclick=()=>{delete S.budgets[mk];save();hideModal();renderStats();toast('CAPS CLEARED');};
  document.getElementById('mSave').onclick=()=>{const newCats=[],newBud={},seen={};document.querySelectorAll('#budRows .budrow').forEach(rw=>{const nm=rw.querySelector('.bcatname').value.trim();if(!nm||seen[nm.toLowerCase()])return;seen[nm.toLowerCase()]=1;newCats.push(nm);const v=parseFloat(rw.querySelector('.bcatamt').value);if(v>0)newBud[nm]=Math.round(v);});if(!newCats.length){toast('KEEP AT LEAST ONE CATEGORY');return;}S.cats=newCats;S.budgets[mk]=newBud;save();hideModal();renderStats();toast('BUDGET SAVED');};
}
function lineChart(data){
  const W=330,H=190,mL=32,mR=10,mT=12,mB=24,pw=W-mL-mR,ph=H-mT-mB;
  const days=data.map(d=>d.day),minD=Math.min(...days),maxD=Math.max(...days);
  const xF=d=>mL+(maxD===minD?pw/2:(d-minD)/(maxD-minD)*pw),yF=p=>mT+(1-p/100)*ph;
  let g='';[0,25,50,75,100].forEach(v=>{const y=yF(v);g+='<line x1="'+mL+'" y1="'+y+'" x2="'+(W-mR)+'" y2="'+y+'" stroke="#cdc7ac" stroke-width="1"/><text x="'+(mL-5)+'" y="'+(y+4)+'" font-family="VT323" font-size="13" fill="#7d7a66" text-anchor="end">'+v+'</text>';});
  const y70=yF(70),pass='<line x1="'+mL+'" y1="'+y70+'" x2="'+(W-mR)+'" y2="'+y70+'" stroke="#16150f" stroke-width="1.5" stroke-dasharray="5 4"/><text x="'+(W-mR)+'" y="'+(y70-5)+'" font-family="VT323" font-size="13" fill="#16150f" text-anchor="end">PASS 70</text>';
  let poly='',dots='';data.forEach(d=>{const x=xF(d.day),y=yF(d.pct);poly+=x+','+y+' ';dots+='<rect x="'+(x-2.5)+'" y="'+(y-2.5)+'" width="5" height="5" fill="#16150f"/>';});
  const line=data.length>1?'<polyline points="'+poly+'" fill="none" stroke="#16150f" stroke-width="2.5"/>':'';
  const xl='<text x="'+xF(minD)+'" y="'+(H-6)+'" font-family="VT323" font-size="13" fill="#7d7a66" text-anchor="middle">D'+minD+'</text>'+(maxD!==minD?'<text x="'+xF(maxD)+'" y="'+(H-6)+'" font-family="VT323" font-size="13" fill="#7d7a66" text-anchor="middle">D'+maxD+'</text>':'');
  return '<svg width="100%" viewBox="0 0 '+W+' '+H+'"><line x1="'+mL+'" y1="'+mT+'" x2="'+mL+'" y2="'+(H-mB)+'" stroke="#16150f" stroke-width="2"/><line x1="'+mL+'" y1="'+(H-mB)+'" x2="'+(W-mR)+'" y2="'+(H-mB)+'" stroke="#16150f" stroke-width="2"/>'+g+pass+line+dots+xl+'</svg>';
}

function showModal(html){document.getElementById('modalBody').innerHTML=html;document.getElementById('modal').classList.add('show');}
function hideModal(){document.getElementById('modal').classList.remove('show');}
function confirmModal(msg,onYes){showModal('<h3>HOLD ON</h3><p>'+msg+'</p><div class="modal-btns"><button class="ghost" id="mCancel">CANCEL</button><button class="solid" id="mOk">CONFIRM</button></div>');document.getElementById('mCancel').onclick=hideModal;document.getElementById('mOk').onclick=()=>{hideModal();onYes();};}
document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')hideModal();};
function go(tab){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+tab).classList.add('active');document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('sel',b.dataset.go===tab));if(tab==='map')renderMap();if(tab==='shop')renderShop();if(tab==='stats')renderStats();if(tab==='log')renderLog();document.querySelector('main').scrollTop=0;}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{if(b.dataset.go==='log')S.viewDay=S.activeDay;go(b.dataset.go);});
document.getElementById('wallet').onclick=()=>{S.viewDay=S.activeDay;go('log');const b=document.getElementById('cb-6');if(b){b.classList.add('open');b.previousElementSibling.classList.remove('closed');b.scrollIntoView({block:'center'});}};
document.getElementById('fab').onclick=quickExpense;
document.getElementById('ccChar').onclick=charManager;
document.getElementById('ccGif').onclick=gifManager;
document.getElementById('ccGuide').onclick=guideModal;
function updateHeader(){const left=(S.rollBudget||dailyBase())-discretionary(S.draft);document.getElementById('walletAmt').innerHTML='₹'+left+'<small>left today</small>';document.getElementById('hDay').textContent='DAY '+S.activeDay;document.getElementById('hDate').textContent=fmt(S.activeDay);}
function renderAll(){S.viewDay=S.activeDay;renderLog();updateHeader();}
let tT;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';clearTimeout(tT);tT=setTimeout(()=>t.style.display='none',1800);}

function istClock(){const n=new Date();const ist=new Date(n.getTime()+n.getTimezoneOffset()*60000+19800000);const p=x=>String(x).padStart(2,'0');const el=document.getElementById('clock');if(el)el.textContent=p(ist.getHours())+':'+p(ist.getMinutes())+':'+p(ist.getSeconds());}
document.getElementById('logoImg').src=Z1_LOGO;
istClock();setInterval(istClock,1000);
renderAll();renderMap();
initStorage();
</script>
